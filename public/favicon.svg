<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020408"/>
      <stop offset="100%" stop-color="#061020"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FFB2"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>
  <!-- Fond arrondi -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Bordure accent -->
  <rect width="32" height="32" rx="7" fill="none" stroke="url(#ac)" stroke-width="1.5" opacity="0.6"/>
  <!-- P stylisé / barre montante -->
  <rect x="8" y="18" width="5" height="8" rx="1" fill="url(#ac)"/>
  <rect x="14" y="13" width="5" height="13" rx="1" fill="url(#ac)" opacity="0.85"/>
  <rect x="20" y="8" width="5" height="18" rx="1" fill="url(#ac)"/>
  <!-- Flèche vers le haut -->
  <polyline points="9,16 16,10 23,5" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
</svg>
