      <stop offset="0%" stop-color="#020408"/>
      <stop offset="100%" stop-color="#061020"/>
    </linearGradient>
    <linearGradient id="gr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FFB2"/>
