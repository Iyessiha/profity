  <line x1="58" y1="90" x2="58" y2="110" stroke="url(#gr)" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="60" x2="100" y2="80" stroke="url(#gr)" stroke-width="4" stroke-linecap="round"/>
  <line x1="142" y1="30" x2="142" y2="46" stroke="url(#gr)" stroke-width="4" stroke-linecap="round"/>
  <!-- Courbe tendance -->
  <polyline points="50,125 100,90 148,52" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
